# tif_compare 测试矩阵
#
# 路径解析规则：
#   - data_dir / preset_dir 可以是绝对路径，或相对于本 TOML 文件
#   - 每个 case 的 fff / ref 相对于 data_dir
#   - source = "external_xml" 时 preset 相对于 preset_dir

data_dir   = "/Users/will/vmwareShare/test_image"
preset_dir = "../settings"

# ─── End-to-end: FFF 自带当前配置 ────────────────────────────────────

[[case]]
name = "e2e_default"
fff  = "test1.fff"
ref  = "test1.tif"

[[case]]
name = "e2e_all_config"
fff  = "test1_all_config.fff"
ref  = "test1_all_config.tif"

[[case]]
name = "e2e_all_config_bw"
fff  = "test1_all_config_bw.fff"
ref  = "test1_all_config_bw.tif"

# ─── 预设矩阵: FFF 内嵌 history by name ─────────────────────────────

[[case]]
name = "emb_rgb_standard"
fff    = "test1_raw.fff"
ref    = "test1_raw_rgb_standard_16bit.tif"
source = "embedded_name"
preset = "test1_raw_rgb_standard"

[[case]]
name = "emb_rgb_saturated"
fff    = "test1_raw.fff"
ref    = "test1_raw_rgb_saturated_16bit.tif"
